<!doctype html>
<html lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Three.js Toon Cube</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: linear-gradient(180deg, #183b62 0%, #163857 60%, #122e4b 100%);
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(150% 120% at 50% 40%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.25) 70%, rgba(0,0,0,0.35) 100%);
      }
      #hud {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 20;
        min-width: 190px;
        padding: 12px 12px 10px;
        border-radius: 14px;
        background: rgba(10, 18, 32, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(8px);
        color: rgba(255, 255, 255, 0.92);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        line-height: 1.2;
        user-select: none;
      }
      #hud .title {
        font-weight: 800;
        letter-spacing: 0.2px;
        margin-bottom: 8px;
        opacity: 0.95;
      }
      #hud .row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin: 6px 0;
        font-weight: 700;
      }
      #hud .board {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      #hud .rank {
        width: 24px;
        opacity: 0.75;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }
      #hud .name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        opacity: 0.95;
      }
      #hud .score {
        width: 64px;
        text-align: left;
        font-variant-numeric: tabular-nums;
      }
      #startOverlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: grid;
        place-items: center;
        background: radial-gradient(120% 120% at 50% 45%, rgba(10, 18, 32, 0.3) 0%, rgba(10, 18, 32, 0.78) 70%, rgba(10, 18, 32, 0.92) 100%);
      }
      #startCard {
        width: min(420px, calc(100vw - 32px));
        padding: 18px 18px 16px;
        border-radius: 16px;
        background: rgba(10, 18, 32, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(10px);
        color: rgba(255, 255, 255, 0.92);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        text-align: center;
        user-select: none;
      }
      #startTitle {
        font-weight: 900;
        letter-spacing: 0.2px;
        margin: 0 0 10px;
      }
      #startHint {
        opacity: 0.8;
        margin: 0 0 14px;
        font-weight: 650;
      }
      #startButton {
        appearance: none;
        border: 0;
        padding: 12px 18px;
        border-radius: 14px;
        background: linear-gradient(180deg, rgba(120, 190, 255, 0.95) 0%, rgba(50, 160, 255, 0.95) 100%);
        color: rgba(7, 15, 26, 0.95);
        font-weight: 900;
        font-size: 18px;
        cursor: pointer;
      }
      #startButton:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div id="vignette"></div>
    <div id="startOverlay" dir="rtl">
      <div id="startCard">
        <h2 id="startTitle">ابدأ المباراة</h2>
        <p id="startHint">اضغط ابدأ أو اضغط Space</p>
        <button id="startButton" type="button">ابدأ</button>
      </div>
    </div>
    <div id="hud" dir="rtl">
      <div class="title">أفضل 5 لاعبين</div>
      <div class="board" id="hudBoard"></div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
