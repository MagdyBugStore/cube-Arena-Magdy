<!doctype html>
<html lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Three.js Toon Cube</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #122e4b;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #hud {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 20;
        min-width: 190px;
        padding: 12px 12px 10px;
        border-radius: 14px;
        background: rgba(10, 18, 32, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.92);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        line-height: 1.2;
        user-select: none;
      }
      #hud .title {
        font-weight: 800;
        letter-spacing: 0.2px;
        margin-bottom: 8px;
        opacity: 0.95;
      }
      #hud .row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin: 6px 0;
        font-weight: 700;
      }
      #hud .board {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: min(60vh, 520px);
        overflow: auto;
      }
      #hud .rank {
        width: 24px;
        opacity: 0.75;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }
      #hud .name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        opacity: 0.95;
      }
      #hud .score {
        width: 64px;
        text-align: left;
        font-variant-numeric: tabular-nums;
      }
      #minimapHud {
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 20;
        padding: 12px 12px 10px;
        border-radius: 14px;
        background: rgba(10, 18, 32, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.92);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        line-height: 1.2;
        user-select: none;
      }
      #topCenter {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        pointer-events: none;
        color: rgba(255, 255, 255, 0.92);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        user-select: none;
      }
      #aliveCounter {
        min-width: 190px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(10, 18, 32, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.12);
        font-weight: 900;
        letter-spacing: 0.2px;
        text-align: center;
      }
      #killFeed {
        position: fixed;
        right: 14px;
        bottom: 14px;
        width: min(320px, calc(100vw - 28px));
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
        z-index: 35;
        pointer-events: none;
      }
      .killItem {
        width: fit-content;
        max-width: 100%;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(10, 18, 32, 0.52);
        border: 1px solid rgba(255, 255, 255, 0.12);
        font-weight: 800;
        text-align: right;
      }
      #startOverlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: grid;
        place-items: center;
        background: rgba(10, 18, 32, 0.9);
      }
      #startCard {
        width: min(420px, calc(100vw - 32px));
        padding: 18px 18px 16px;
        border-radius: 16px;
        background: rgba(10, 18, 32, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.14);
        color: rgba(255, 255, 255, 0.92);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        text-align: center;
        user-select: none;
      }
      #startTitle {
        font-weight: 900;
        letter-spacing: 0.2px;
        margin: 0 0 10px;
      }
      #startHint {
        opacity: 0.8;
        margin: 0 0 14px;
        font-weight: 650;
      }
      #nameRow {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin: 0 0 14px;
        text-align: right;
      }
      #nameLabel {
        font-weight: 850;
        opacity: 0.92;
        letter-spacing: 0.2px;
      }
      #nameInput {
        width: 100%;
        box-sizing: border-box;
        padding: 12px 12px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.92);
        font-weight: 800;
        outline: none;
      }
      #nameInput::placeholder {
        color: rgba(255, 255, 255, 0.45);
      }
      #nameInput:focus {
        border-color: rgba(120, 190, 255, 0.55);
      }
      .primaryBtn {
        width: 100%;
        box-sizing: border-box;
        padding: 12px 12px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(120, 190, 255, 0.18);
        color: rgba(255, 255, 255, 0.95);
        font-weight: 950;
        cursor: pointer;
      }
      .primaryBtn:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .secondaryBtn {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.92);
        font-weight: 850;
        cursor: pointer;
      }
      .section {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .fieldLabel {
        font-weight: 850;
        opacity: 0.92;
        letter-spacing: 0.2px;
        text-align: right;
      }
      .textInput {
        width: 100%;
        box-sizing: border-box;
        padding: 12px 12px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.92);
        font-weight: 800;
        outline: none;
      }
      .textInput::placeholder {
        color: rgba(255, 255, 255, 0.45);
      }
      .roomsList {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 220px;
        overflow: auto;
        padding: 8px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.03);
      }
      .roomItem {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 10px 10px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.14);
      }
      .roomMeta {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
      }
      .roomId {
        font-weight: 950;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .roomSub {
        opacity: 0.8;
        font-weight: 750;
        font-size: 12px;
      }
      .lobbyPlayers {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 8px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.03);
      }
      .playerItem {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 10px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.14);
        font-weight: 850;
      }
      #endLeaderboard {
        margin: 10px 0 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        text-align: right;
      }
      .lbTitle {
        font-weight: 900;
        opacity: 0.95;
        text-align: center;
      }
      .lbRow {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.10);
        font-weight: 850;
        font-variant-numeric: tabular-nums;
      }
      .lbLeft {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        opacity: 0.95;
      }
      .lbRight {
        opacity: 0.9;
        white-space: nowrap;
      }
      #arenaRow {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin: 0 0 6px;
      }
      .arenaBtn {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.14);
        padding: 12px 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.92);
        font-weight: 900;
        font-size: 15px;
        cursor: pointer;
        text-align: center;
      }
      .arenaBtn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .arenaBtnActive {
        border-color: rgba(120, 190, 255, 0.45);
        background: rgba(120, 190, 255, 0.10);
      }
      @media (max-width: 600px) {
        #hud {
          top: 8px;
          right: 8px;
          min-width: 150px;
          max-width: calc(100vw - 16px);
          padding: 8px 8px 6px;
          border-radius: 12px;
          font-size: 12px;
        }
        #hud .title {
          margin-bottom: 6px;
        }
        #hud .row {
          gap: 8px;
          margin: 4px 0;
        }
        #hud .rank {
          width: 20px;
        }
        #hud .score {
          width: 52px;
        }
        #minimapHud {
          top: 8px;
          left: 8px;
          padding: 8px 8px 6px;
          border-radius: 12px;
          font-size: 12px;
        }
        #topCenter {
          top: 8px;
          gap: 6px;
        }
        #aliveCounter {
          min-width: 150px;
          padding: 8px 10px;
          border-radius: 12px;
          font-size: 13px;
        }
        #killFeed {
          right: 8px;
          bottom: 8px;
          width: min(280px, calc(100vw - 16px));
          gap: 8px;
        }
        .killItem {
          padding: 8px 10px;
          border-radius: 12px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="startOverlay" dir="rtl">
      <div id="startCard">
        <h2 id="startTitle">ابدأ المباراة</h2>
        <p id="startHint">ادخل User name ثم اختار أو أنشئ Room</p>
        <div id="stepName" class="section">
          <div id="nameRow">
            <div id="nameLabel">User name</div>
            <input id="nameInput" class="textInput" type="text" dir="auto" autocomplete="nickname" maxlength="18" placeholder="اكتب اسمك" />
          </div>
          <button id="continueBtn" class="primaryBtn" type="button">متابعة</button>
        </div>
        <div id="stepRooms" class="section" style="display: none">
          <div class="fieldLabel">Rooms المتاحة</div>
          <div id="roomsList" class="roomsList"></div>
          <button id="refreshRoomsBtn" class="secondaryBtn" type="button">تحديث</button>
          <button id="toggleCreateRoomBtn" class="primaryBtn" type="button">إنشاء Room جديدة</button>
          <div id="createRoomDetails" class="section" style="display: none">
            <div class="fieldLabel">تفاصيل إنشاء الـ Room</div>
            <input id="roomIdInput" class="textInput" type="text" dir="ltr" maxlength="24" placeholder="room-id (مثال: magdy1)" />
            <div id="arenaRow">
              <button class="arenaBtn" type="button" data-arena="default">الشكل الحالي</button>
              <button class="arenaBtn" type="button" data-arena="football">ملعب كورة</button>
              <button class="arenaBtn" type="button" data-arena="tennis">ملعب تنس</button>
              <button class="arenaBtn" type="button" data-arena="interlock">انترلوك</button>
              <button class="arenaBtn" type="button" data-arena="geo">أرض هندسية</button>
            </div>
            <input id="maxPlayersInput" class="textInput" type="number" min="2" max="20" value="8" />
            <button id="createRoomBtn" class="primaryBtn" type="button">Create Room</button>
            <button id="cancelCreateRoomBtn" class="secondaryBtn" type="button">إلغاء</button>
          </div>
        </div>
        <div id="stepLobby" class="section" style="display: none">
          <div id="lobbyInfo" class="fieldLabel"></div>
          <div id="lobbyPlayers" class="lobbyPlayers"></div>
          <button id="startMatchBtn" class="primaryBtn" type="button" disabled>ابدأ اللعب</button>
          <button id="leaveRoomBtn" class="secondaryBtn" type="button">خروج من الـ Room</button>
        </div>
        <div id="endLeaderboard"></div>
      </div>
    </div>
    <div id="topCenter" dir="rtl">
      <div id="aliveCounter"></div>
      <div id="killFeed"></div>
    </div>
    <div id="minimapHud" dir="rtl"></div>
    <div id="hud" dir="rtl">
      <div class="title">اللاعبين</div>
      <div class="board" id="hudBoard"></div>
    </div>
    <script type="importmap">
      {
        "imports": {
          "@geckos.io/client": "/_deps/@geckos.io/client/lib/bundle.js",
          "@geckos.io/common/": "/_deps/@geckos.io/common/",
          "@yandeu/events": "/_deps/@yandeu/events/lib/index.js",
          "@yandeu/events/": "/_deps/@yandeu/events/"
        }
      }
    </script>
    <script src="/_deps/protobufjs/dist/protobuf.min.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
