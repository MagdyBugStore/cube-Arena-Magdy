<!doctype html>
<html lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Three.js Toon Cube</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: linear-gradient(180deg, #183b62 0%, #163857 60%, #122e4b 100%);
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #label {
        position: fixed;
        left: 50%;
        top: 76px;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.95);
        font: 700 18px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
        pointer-events: none;
        user-select: none;
      }
      #vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(150% 120% at 50% 40%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.25) 70%, rgba(0,0,0,0.35) 100%);
      }
    </style>
  </head>
  <body>
    <div id="label">You</div>
    <div id="vignette"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
